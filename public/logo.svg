<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Asosiy yashil gradient -->
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Matn uchun gradient -->
    <linearGradient id="gText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for bonds -->
    <filter id="bondGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dark fon uchun circle clip -->
    <clipPath id="circleClip">
      <circle cx="200" cy="185" r="148"/>
    </clipPath>
  </defs>

  <!-- === FON === -->
  <rect width="400" height="400" fill="#060a10" rx="32"/>

  <!-- Subtle radial glow background -->
  <radialGradient id="bgGlow" cx="50%" cy="46%" r="50%">
    <stop offset="0%" stop-color="#0d2a1a" stop-opacity="1"/>
    <stop offset="100%" stop-color="#060a10" stop-opacity="1"/>
  </radialGradient>
  <circle cx="200" cy="185" r="148" fill="url(#bgGlow)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="185" r="148"
    fill="none"
    stroke="url(#gGreen)"
    stroke-width="1.5"
    stroke-dasharray="6 4"
    opacity="0.35"/>

  <!-- Inner ring -->
  <circle cx="200" cy="185" r="118"
    fill="none"
    stroke="#1e3a2a"
    stroke-width="1"
    opacity="0.6"/>

  <!-- === OKTAEDRAL MOLEKULA TUZILISHI === -->
  <!-- Markaziy atom -->
  <circle cx="200" cy="185" r="18" fill="url(#gGreen)" filter="url(#glow)" opacity="0.95"/>
  <circle cx="200" cy="185" r="10" fill="#fff" opacity="0.15"/>

  <!-- 6 ta ligand atomi (oktaedral) -->
  <!-- Top -->
  <line x1="200" y1="167" x2="200" y2="112" stroke="url(#gGreen)" stroke-width="2" opacity="0.7" filter="url(#bondGlow)"/>
  <circle cx="200" cy="104" r="11" fill="#0d1520" stroke="#4ade80" stroke-width="2"/>
  <circle cx="200" cy="104" r="5" fill="#4ade80" opacity="0.8"/>

  <!-- Bottom -->
  <line x1="200" y1="203" x2="200" y2="258" stroke="url(#gGreen)" stroke-width="2" opacity="0.7" filter="url(#bondGlow)"/>
  <circle cx="200" cy="266" r="11" fill="#0d1520" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="200" cy="266" r="5" fill="#22d3ee" opacity="0.8"/>

  <!-- Left -->
  <line x1="182" y1="185" x2="130" y2="185" stroke="url(#gGreen)" stroke-width="2" opacity="0.7" filter="url(#bondGlow)"/>
  <circle cx="122" cy="185" r="11" fill="#0d1520" stroke="#4ade80" stroke-width="2"/>
  <circle cx="122" cy="185" r="5" fill="#4ade80" opacity="0.8"/>

  <!-- Right -->
  <line x1="218" y1="185" x2="270" y2="185" stroke="url(#gGreen)" stroke-width="2" opacity="0.7" filter="url(#bondGlow)"/>
  <circle cx="278" cy="185" r="11" fill="#0d1520" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="278" cy="185" r="5" fill="#22d3ee" opacity="0.8"/>

  <!-- Top-left (diagonal) -->
  <line x1="187" y1="172" x2="148" y2="133" stroke="url(#gGreen)" stroke-width="1.5" opacity="0.5" filter="url(#bondGlow)"/>
  <circle cx="141" cy="126" r="9" fill="#0d1520" stroke="#a78bfa" stroke-width="1.8"/>
  <circle cx="141" cy="126" r="4" fill="#a78bfa" opacity="0.8"/>

  <!-- Bottom-right (diagonal) -->
  <line x1="213" y1="198" x2="252" y2="237" stroke="url(#gGreen)" stroke-width="1.5" opacity="0.5" filter="url(#bondGlow)"/>
  <circle cx="259" cy="244" r="9" fill="#0d1520" stroke="#a78bfa" stroke-width="1.8"/>
  <circle cx="259" cy="244" r="4" fill="#a78bfa" opacity="0.8"/>

  <!-- Markaziy atom ustidagi "M" belgisi -->
  <text x="200" y="190" text-anchor="middle" dominant-baseline="middle"
    font-family="Georgia, serif" font-size="12" font-weight="bold"
    fill="#060a10" opacity="0.9">M</text>

  <!-- === MATN === -->
  <!-- JDA -->
  <text x="200" y="322"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="38"
    font-weight="900"
    letter-spacing="6"
    fill="url(#gText)">JDA</text>

  <!-- KIMYO -->
  <text x="200" y="356"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="10"
    fill="#5b7898">KIMYO</text>

  <!-- Dekorativ chiziq matn ustida -->
  <line x1="120" y1="308" x2="280" y2="308"
    stroke="url(#gGreen)" stroke-width="0.8" opacity="0.3"/>

  <!-- To'rtta kichik nuqta - burchaklarda -->
  <circle cx="60" cy="60" r="2" fill="#4ade80" opacity="0.3"/>
  <circle cx="340" cy="60" r="2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="60" cy="340" r="2" fill="#22d3ee" opacity="0.3"/>
  <circle cx="340" cy="340" r="2" fill="#4ade80" opacity="0.3"/>

  <!-- Koordinata ko'rsatkichlari (subtle) -->
  <text x="200" y="104" text-anchor="middle" dominant-baseline="middle"
    font-family="monospace" font-size="7" fill="#4ade80" opacity="0.6">NH₃</text>
  <text x="200" y="266" text-anchor="middle" dominant-baseline="middle"
    font-family="monospace" font-size="7" fill="#22d3ee" opacity="0.6">Cl⁻</text>
  <text x="122" y="185" text-anchor="middle" dominant-baseline="middle"
    font-family="monospace" font-size="7" fill="#4ade80" opacity="0.6">NH₃</text>
  <text x="278" y="185" text-anchor="middle" dominant-baseline="middle"
    font-family="monospace" font-size="7" fill="#22d3ee" opacity="0.6">Cl⁻</text>
</svg>
