<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fon -->
  <rect width="32" height="32" fill="#060a10" rx="7"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#g)" stroke-width="0.8" opacity="0.4" stroke-dasharray="3 2"/>

  <!-- Bond chiziqlar -->
  <line x1="16" y1="10" x2="16" y2="4.5" stroke="#4ade80" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="22" x2="16" y2="27.5" stroke="#22d3ee" stroke-width="1.2" opacity="0.7"/>
  <line x1="10" y1="16" x2="4.5" y2="16" stroke="#4ade80" stroke-width="1.2" opacity="0.7"/>
  <line x1="22" y1="16" x2="27.5" y2="16" stroke="#22d3ee" stroke-width="1.2" opacity="0.7"/>

  <!-- Ligand atomlar -->
  <circle cx="16" cy="4" r="2.2" fill="#0d1520" stroke="#4ade80" stroke-width="1"/>
  <circle cx="16" cy="28" r="2.2" fill="#0d1520" stroke="#22d3ee" stroke-width="1"/>
  <circle cx="4" cy="16" r="2.2" fill="#0d1520" stroke="#4ade80" stroke-width="1"/>
  <circle cx="28" cy="16" r="2.2" fill="#0d1520" stroke="#22d3ee" stroke-width="1"/>

  <!-- Markaziy atom -->
  <circle cx="16" cy="16" r="5.5" fill="url(#g)" filter="url(#gl)"/>
  <circle cx="16" cy="16" r="2.5" fill="#fff" opacity="0.15"/>
</svg>
